{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex flex-col justify-center items-center">
    <h1 class="text-3xl font-bold mb-4">🏠 Вітаємо у Minecraft Skin Shop!</h1>
    <p class="text-gray-600 mb-6">Тут з'явиться головна сторінка магазину.</p>

    {% if user.is_authenticated %}
        <p class="text-green-600">Ви увійшли як <strong>{{ user.email }}</strong></p>
    {% endif %}
</div>
{% endblock %}
