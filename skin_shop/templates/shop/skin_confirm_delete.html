{% extends "base.html" %}
{% block title %}Видалити скин{% endblock %}

{% block content %}

<div class="max-w-xl mx-auto bg-gray-800 p-6 rounded-xl shadow-lg text-center">

    <h1 class="text-2xl font-bold mb-4">Видалити скин?</h1>

    <p class="text-gray-300 mb-6">
        Ви впевнені, що хочете видалити <strong>{{ skin.name }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}
        <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg font-semibold">
            Видалити
        </button>
    </form>

    <a href="{% url 'shop:skin_list' %}"
       class="block mt-4 text-gray-400 hover:text-gray-200">
        Назад до списку
    </a>

</div>

{% endblock %}
